name: CI
on:
  workflow_dispatch:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      openai:
        image: tidedra/mock_openai:latest
        ports:
          - 30000:30000
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7.1.4


      - name: Run Pytest
        env:
          ZOTERO_ID: "0"
          ZOTERO_KEY: "AbCdEfGhIjKlMnOpQrStUvWx"
          OPENAI_API_KEY: "sk-xxx"
          OPENAI_API_BASE: "http://openai:30000/v1"
        run: |
          uv run pytest -m ""